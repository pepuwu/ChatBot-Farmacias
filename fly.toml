# fly.toml app configuration file generated for chatbotfarmacias on 2026-04-23T23:29:51-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chatbotfarmacias'
primary_region = 'gru'

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[processes]
  app = 'node ./dbsetup.js /app/start.sh'

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 8080
  force_https = true
  # Bot must stay alive to maintain WhatsApp Baileys connections
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '15s'
    interval = '30s'
    method = 'GET'
    path = '/'
    timeout = '5s'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
