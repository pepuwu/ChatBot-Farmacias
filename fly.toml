# fly.toml app configuration file generated for chatbot-farmacias on 2026-04-24T02:22:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chatbot-farmacias'
primary_region = 'gru'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
